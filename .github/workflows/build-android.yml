name: Build Android Client

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Ninja and Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build

      - name: Install Host Qt 6 (Linux gcc_64)
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.6.3'
          host: 'linux'
          target: 'desktop'
          arch: 'gcc_64'

      - name: Install Target Qt 6 (Android arm64)
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.6.3'
          host: 'linux'
          target: 'android'
          arch: 'android_arm64_v8a'
          modules: 'qtmultimedia'

      - name: Configure CMake
        run: |
          mkdir -p build_android
          cmake -S client -B build_android -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=/home/runner/work/dsfsdgsdgsdgsdgsd/Qt/6.6.3/android_arm64_v8a/lib/cmake/Qt6/qt.toolchain.cmake \
            -DANDROID_SDK_ROOT=$ANDROID_SDK_ROOT \
            -DANDROID_NDK_ROOT=$ANDROID_NDK_LATEST_HOME \
            -DANDROID_ABI=arm64-v8a \
            -DQT_HOST_PATH=/home/runner/work/dsfsdgsdgsdgsdgsd/Qt/6.6.3/gcc_64 \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build Project (APK)
        run: |
          cmake --build build_android --target apk --parallel 4

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tortu-android-arm64-apk
          path: build_android/android-build/build/outputs/apk/**/*.apk
